name: genai_components
description: A comprehensive Flutter UI component library with theming, routing, state management, charts, and 30+ reusable widgets. Built for rapid app development with sensible defaults.
version: 4.0.0
homepage: https://github.com/generazione-ai/genai_components
repository: https://github.com/generazione-ai/genai_components
issue_tracker: https://github.com/generazione-ai/genai_components/issues

topics:
  - ui
  - widgets
  - theme
  - components
  - design-system

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Theme & styling
  google_fonts: ^6.2.1
  responsive_framework: ^1.5.1
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.1.0

  # State & DI
  provider: ^6.1.2

  # Core utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  http: ^1.3.0
  rxdart: ^0.28.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  collection: ^1.18.0

  # Form & input
  file_picker: ^8.1.4
  image_picker: ^1.1.0
  flex_color_picker: ^3.7.0
  month_picker_dialog: ^6.0.3
  calendar_date_picker2: ^2.0.0
  auto_size_text: ^3.0.0

  # Icons
  hugeicons: ^1.1.5

  # Data display
  barcode_widget: ^2.0.4
  syncfusion_flutter_charts: ^29.1.38
  syncfusion_flutter_calendar: ^29.1.38
  fl_chart: ^1.1.1

  # Media & documents
  video_player: ^2.9.5
  chewie: ^1.11.3
  pdf: ^3.10.0
  pdfrx: ^2.2.4

  # Animation
  flutter_animate: ^4.2.0+1

  # Table & list
  diffutil_sliverlist: ^0.5.1

  # Drag & drop
  desktop_drop: ^0.6.0
  flutter_dropzone: ^4.2.1

  # Interactive
  custom_interactive_viewer: ^0.0.9

  # Router & Navigation
  go_router: ^14.3.0
  flutter_breadcrumb: ^1.0.1

  # ViewModel
  stacked: ^3.4.4

  # App info
  package_info_plus: ^8.3.0

  # HTTP parsing
  http_parser: ^4.1.0
  timeago: ^3.7.0

  # Localization
  flutter_localizations:
    sdk: flutter

  # Misc
  universal_html: ^2.2.4
  star_rating: ^0.11.0
  flutter_hooks: ^0.21.2
  json_annotation: ^4.9.0
  mime_type: ^1.0.1
  uuid: ^4.5.0
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
